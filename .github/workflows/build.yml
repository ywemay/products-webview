name: Build Company File Manager

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: "Company-File-Manager"

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "$GITHUB_REF" ]; then
            echo "value=dev" >> "$GITHUB_OUTPUT"
          else
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

  linux:
    needs: [version]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create prodlib symlink
        run: ln -sf ../shared/prodlib prodlib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev \
            libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Company-File-Manager-Linux.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-v${{ needs.version.outputs.tag }}
          path: dist/Company-File-Manager-Linux/
          if-no-files-found: error

  macos:
    needs: [version]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create prodlib symlink
        run: ln -sf ../shared/prodlib prodlib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onedir --windowed \
            --name "Company-File-Manager" \
            --icon app.icns \
            --add-data "frontend:frontend" \
            --hidden-import prodlib \
            --hidden-import prodlib.core \
            --hidden-import prodlib.store \
            --hidden-import prodlib.deal \
            --hidden-import bottle \
            app.py

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Company File Manager" \
            --volicon app.icns \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Company-File-Manager.app" 175 190 \
            --hide-extension "Company-File-Manager.app" \
            --app-drop-link 425 190 \
            "Company-File-Manager-v${{ needs.version.outputs.tag }}.dmg" \
            "dist/Company-File-Manager.app/" || \
          echo "DMG creation skipped (optional)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS-v${{ needs.version.outputs.tag }}
          path: |
            dist/Company-File-Manager.app
            Company-File-Manager-*.dmg
          if-no-files-found: warn

  windows:
    needs: [version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create prodlib symlink
        shell: bash
        run: ln -sf ../shared/prodlib prodlib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onedir --windowed `
            --name "Company-File-Manager" `
            --icon app.icns `
            --add-data "frontend;frontend" `
            --hidden-import prodlib `
            --hidden-import prodlib.core `
            --hidden-import prodlib.store `
            --hidden-import prodlib.deal `
            --hidden-import bottle `
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-v${{ needs.version.outputs.tag }}
          path: dist/Company-File-Manager/
          if-no-files-found: error

  release:
    needs: [version, linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Company File Manager ${{ needs.version.outputs.tag }}"
          files: |
            ${{ env.APP_NAME }}-Linux-*/
            ${{ env.APP_NAME }}-macOS-*/
            ${{ env.APP_NAME }}-Windows-*/
          generate_release_notes: true
